<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gauntlet UI — WorldEventsWindow</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; }
    .gauntlet-scene { display: flex; flex-direction: column; min-height: 100vh; width: 100%; }
    .gauntlet-Widget, .gauntlet-BrushWidget { display: flex; flex-direction: column; }
    .gauntlet-scrollbar { flex-shrink: 0; }
    button { cursor: pointer; color: #FFE6B6; background: #3a2a1a; border: none; border-radius: 4px; }
    input { outline: none; }
  </style>
</head>
<body>
  <div class="gauntlet-scene" data-prefab="WorldEventsWindow">
    <div id="EventsWindow" class="gauntlet-Widget" style="flex: 1; min-width: 0; flex: 1; min-height: 0; background-color: #0A0A0ACC; display: flex; flex-direction: column"><div id="WorldEventsMainWindow" class="gauntlet-BrushWidget" style="width: 1180px; height: 760px; display: flex; flex-direction: column; align-self: center; align-self: center"><div class="gauntlet-Widget" style="flex: 1; min-width: 0; height: 90px; display: flex; flex-direction: column; align-self: center; align-self: flex-start"><div class="gauntlet-BrushWidget" style="flex: 1; min-width: 0; flex: 1; min-height: 0; display: flex; flex-direction: column"></div><div class="gauntlet-Widget" style="flex: 1; min-width: 0; flex: 1; min-height: 0; display: flex; flex-direction: column"><span data-gauntlet="RichTextWidget" data-text="[@TitleText]" style="flex: 1; min-width: 0; background-color: #FFE6B685; display: flex; flex-direction: column; align-self: center; align-self: center; font-size: 37px; color: #FFE6B685">[@TitleText]</span><span data-gauntlet="RichTextWidget" data-text="[@SubtitleText]" style="flex: 1; min-width: 0; background-color: #B4E6FFFF; display: flex; flex-direction: column; align-self: center; align-self: center; font-size: 18px; color: #B4E6FFFF">[@SubtitleText]</span><span data-gauntlet="RichTextWidget" data-text="[@LastUpdatedText]" style="flex: 1; min-width: 0; background-color: #A0D6F2FF; display: flex; flex-direction: column; align-self: center; align-self: center; font-size: 15px; color: #A0D6F2FF">[@LastUpdatedText]</span></div><button id="CloseButton" style="width: 42px; height: 42px; display: flex; flex-direction: column; align-self: flex-end; align-self: center; margin-right: 24px" data-gauntlet="ButtonWidget"><span>Button</span></button></div><div class="gauntlet-Widget" style="flex: 1; min-width: 0; flex: 1; min-height: 0; display: flex; flex-direction: column; margin-left: 24px; margin-right: 24px; margin-top: 90px; margin-bottom: 24px"><div class="gauntlet-BrushWidget" style="flex: 1; min-width: 0; flex: 1; min-height: 0; background-color: #3315B1FF; display: flex; flex-direction: column; align-self: center; align-self: center; margin: 12px"></div><div class="gauntlet-BrushWidget" style="flex: 1; min-width: 0; flex: 1; min-height: 0; background-color: #1A0B1A1F; display: flex; flex-direction: column; align-self: center; align-self: center; margin: 10px"></div><div class="gauntlet-ListPanel" style="flex: 1; min-width: 0; flex: 1; min-height: 0; display: flex; flex-direction: column; align-self: flex-start"><div class="gauntlet-Widget" style="flex: 1; min-width: 0; height: 45px; display: flex; flex-direction: column; margin-bottom: 8px"><span data-gauntlet="RichTextWidget" data-text="[@SummaryDescription]" style="display: flex; flex-direction: column; font-size: 20px; color: #e0e0e0">[@SummaryDescription]</span><span data-gauntlet="RichTextWidget" data-text="[@FilterHint]" style="background-color: #A0B8FFFF; display: flex; flex-direction: column; font-size: 16px; color: #A0B8FFFF">[@FilterHint]</span></div><div class="gauntlet-ListPanel" style="flex: 1; min-width: 0; height: 520px; display: flex; flex-direction: row; align-self: center; margin-top: 6px"><div class="gauntlet-ScrollablePanel" style="flex: 1; min-width: 0; flex: 1; min-height: 0; display: flex; flex-direction: column overflow: auto;"><div id="DeclarationsClipRect" class="gauntlet-Widget" style="flex: 1; min-width: 0; flex: 1; min-height: 0; display: flex; flex-direction: column"><div id="DeclarationsList" class="gauntlet-NavigatableListPanel" style="flex: 1; min-width: 0; display: flex; flex-direction: column-reverse"><div class="item-template" data-datasource="{DeclarationList}"><span>[Item]</span></div></div></div></div><div id="DeclarationsScrollbar" class="scrollbar" style="width: 22px; flex: 1; min-height: 0; display: flex; flex-direction: column; align-self: flex-end; margin-left: 2px; margin-right: 4px; margin-top: 100px; margin-bottom: 1px; width: 22px; background: rgba(255,255,255,0.1); border-radius: 4px"></div></div></div></div></div></div>
  </div>
</body>
</html>
