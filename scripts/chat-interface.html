<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gauntlet UI — ChatInterface</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; }
    .gauntlet-scene { display: flex; flex-direction: column; min-height: 100vh; width: 100%; }
    .gauntlet-Widget, .gauntlet-BrushWidget { display: flex; flex-direction: column; }
    .gauntlet-scrollbar { flex-shrink: 0; }
    button { cursor: pointer; color: #FFE6B6; background: #3a2a1a; border: none; border-radius: 4px; }
    input { outline: none; }
  </style>
</head>
<body>
  <div class="gauntlet-scene" data-prefab="ChatInterface">
    <div class="gauntlet-Widget" style="flex: 1; min-width: 0; flex: 1; min-height: 0; display: flex; flex-direction: row"><div class="gauntlet-Widget" style="flex: 1; min-width: 0; flex: 1; min-height: 0; background-color: #141414FF; display: flex; flex-direction: column"><div class="gauntlet-frame-inner" style="display: grid; grid-template-rows: 80px 1fr; grid-template-columns: 1fr 2px 300px; flex: 1; min-height: 0; min-width: 0"><div style="grid-area: 1/1/2/4; min-width: 0; min-height: 0"><div class="gauntlet-Widget" style="flex: 1; min-width: 0; height: 80px; background-color: #141414FF; display: flex; flex-direction: row; align-self: flex-start"><span data-gauntlet="TextWidget" data-text="Conversation Log" style="width: fit-content; height: fit-content; display: flex; flex-direction: column; align-self: flex-start; align-self: flex-start; transform: translate(16px, 10px); font-size: 14px; color: #e0e0e0">Conversation Log</span><span data-gauntlet="RichTextWidget" data-text="[@NpcName]" style="width: fit-content; height: fit-content; display: flex; flex-direction: column; align-self: flex-start; align-self: flex-end; transform: translate(16px, -28px); font-size: 14px; color: #e0e0e0">[@NpcName]</span><span data-gauntlet="TextWidget" data-text="[@NpcTitle]" style="width: fit-content; height: fit-content; display: flex; flex-direction: column; align-self: flex-start; align-self: flex-end; transform: translate(16px, -10px); font-size: 12px; color: #e0e0e0">[@NpcTitle]</span></div></div><div style="grid-area: 2/1/3/2; min-width: 0; min-height: 0"><div class="gauntlet-Widget" style="flex: 1; min-width: 0; flex: 1; min-height: 0; display: flex; flex-direction: column"><div class="gauntlet-Widget" style="flex: 1; min-width: 0; flex: 1; min-height: 0; display: flex; flex-direction: column; opacity: 1.0"></div><div id="MsgScroll" class="gauntlet-ScrollablePanel" style="flex: 1; min-width: 0; flex: 1; min-height: 0; display: flex; flex-direction: column; margin-right: 24px; margin-top: 4px; margin-bottom: 52px overflow: auto;"><div id="MsgClip" class="gauntlet-Widget" style="flex: 1; min-width: 0; flex: 1; min-height: 0; display: flex; flex-direction: column"><div id="MsgList" class="gauntlet-ListPanel" style="flex: 1; min-width: 0; height: fit-content; display: flex; flex-direction: column-reverse; margin-left: 18px; margin-right: 18px; margin-top: 6px; margin-bottom: 6px; gap: 10px"><div class="item-template" data-datasource="{MessageList}"><span>[Item]</span></div></div></div></div><div id="MsgScrollbar" class="scrollbar" style="width: 22px; flex: 1; min-height: 0; display: flex; flex-direction: column; align-self: flex-end; margin-right: 2px; margin-top: 4px; margin-bottom: 52px; width: 22px; background: rgba(255,255,255,0.1); border-radius: 4px"></div><div class="gauntlet-Widget" style="flex: 1; min-width: 0; height: 2px; background-color: #FFFFFF22; display: flex; flex-direction: column; align-self: flex-end; transform: translate(0px, -52px)"></div><div class="gauntlet-Widget" style="flex: 1; min-width: 0; height: 52px; background-color: #1A110CFF; display: flex; flex-direction: row; align-self: flex-end"><div class="gauntlet-Widget" style="flex: 1; min-width: 0; flex: 1; min-height: 0; display: flex; flex-direction: column; opacity: 0.34"></div><div class="gauntlet-Widget" style="flex: 1; min-width: 0; flex: 1; min-height: 0; background-color: #2A1A11FF; display: flex; flex-direction: column; opacity: 0.2"></div><div class="gauntlet-Widget" style="flex: 1; min-width: 0; height: 38px; display: flex; flex-direction: column; align-self: flex-start; align-self: center; margin-left: 8px; margin-right: 106px"><div class="gauntlet-Widget" style="flex: 1; min-width: 0; flex: 1; min-height: 0; display: flex; flex-direction: column; opacity: 0.16"></div><input type="text" placeholder="..." value="" style="flex: 1; min-width: 0; flex: 1; min-height: 0; display: flex; flex-direction: column; align-self: center; align-self: center; margin: 10px 4px 10px 4px; padding: 4px 10px; font-size: 14px; color: #e0e0e0; background: #2a1a11; border: 1px solid rgba(255,255,255,0.2); border-radius: 4px" /></div><button style="width: 90px; height: 38px; display: flex; flex-direction: column; align-self: flex-end; align-self: center; margin-right: 8px" data-gauntlet="ButtonWidget"><span data-gauntlet="TextWidget" data-text="Send" style="flex: 1; min-width: 0; height: 22px; display: flex; flex-direction: column; align-self: center; margin-left: 20px; margin-right: 20px; font-size: 14px; color: #e0e0e0">Send</span></button></div></div></div><div style="grid-area: 2/2/3/3; min-width: 0; min-height: 0"><div class="gauntlet-Widget" style="width: 2px; flex: 1; min-height: 0; background-color: #FFFFFF22; display: flex; flex-direction: column; align-self: flex-end; margin-top: 80px"></div></div><div style="grid-area: 2/3/3/4; min-width: 0; min-height: 0"><div class="gauntlet-Widget" style="width: 300px; flex: 1; min-height: 0; display: flex; flex-direction: column; align-self: flex-end; margin-top: 80px"><span data-gauntlet="RichTextWidget" data-text="Diplomacy & Relation" style="flex: 1; min-width: 0; height: 36px; background-color: #FFE6B685; display: flex; flex-direction: column; align-self: center; align-self: flex-start; transform: translate(0px, 8px); font-size: 18px; color: #FFE6B685">Diplomacy & Relation</span><div class="gauntlet-Widget" style="flex: 1; min-width: 0; height: 2px; background-color: #FFFFFF22; display: flex; flex-direction: column; align-self: flex-start; transform: translate(0px, 48px); margin-left: 8px; margin-right: 8px"></div><div id="RightScroll" class="gauntlet-ScrollablePanel" style="flex: 1; min-width: 0; flex: 1; min-height: 0; display: flex; flex-direction: column; margin-right: 24px; margin-top: 54px; margin-bottom: 50px overflow: auto;"><div id="RightClip" class="gauntlet-Widget" style="flex: 1; min-width: 0; flex: 1; min-height: 0; display: flex; flex-direction: column"><div id="RightList" class="gauntlet-NavigatableListPanel" style="flex: 1; min-width: 0; height: fit-content; display: flex; flex-direction: column; margin-left: 8px; margin-right: 8px; margin-top: 4px; margin-bottom: 4px; gap: 3px"><div class="item-template" data-datasource="{RightPanelItems}"><span>[Item]</span></div></div></div></div><div id="RightScrollbar" class="scrollbar" style="width: 22px; flex: 1; min-height: 0; display: flex; flex-direction: column; align-self: flex-end; margin-right: 2px; margin-top: 54px; margin-bottom: 50px; width: 22px; background: rgba(255,255,255,0.1); border-radius: 4px"></div><button style="width: 130px; height: 38px; display: flex; flex-direction: column; align-self: center; align-self: flex-end; margin-bottom: 8px" data-gauntlet="ButtonWidget"><span data-gauntlet="TextWidget" data-text="Close" style="flex: 1; min-width: 0; height: 22px; display: flex; flex-direction: column; align-self: center; margin-left: 30px; margin-right: 25px; font-size: 14px; color: #e0e0e0">Close</span></button></div></div></div></div></div>
  </div>
</body>
</html>
